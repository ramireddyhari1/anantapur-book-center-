server {
    listen 80;
    server_name anantapurbookcenter.software www.anantapurbookcenter.software 16.112.122.163;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name anantapurbookcenter.software www.anantapurbookcenter.software 16.112.122.163;

    ssl_certificate /etc/letsencrypt/live/anantapurbookcenter.software/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/anantapurbookcenter.software/privkey.pem;

    location / {
        proxy_pass http://app:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
