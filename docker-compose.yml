services:
  app:
    build: .
    container_name: abc-php-main
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
    environment:
      - DB_HOST=db
      - DB_NAME=abc_db
      - DB_USER=postgres
      - DB_PASS=postgres_password
    depends_on:
      - db
    networks:
      - abc-network

  db:
    image: postgres:16-alpine
    container_name: abc-db-main
    environment:
      - POSTGRES_DB=abc_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres_password
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - abc-network

networks:
  abc-network:
    driver: bridge

volumes:
  db_data:
